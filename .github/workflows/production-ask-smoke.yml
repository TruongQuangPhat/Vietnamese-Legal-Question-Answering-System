name: Production Ask Smoke

on:
  workflow_dispatch:
    inputs:
      confirm_real_production_ask:
        description: "Type I_UNDERSTAND_THIS_CALLS_REAL_PRODUCTION_SERVICES to run one production /ask smoke."
        required: true
        type: string
      question:
        description: "Safe follow-up legal research question for the single smoke request."
        required: false
        default: "Vậy hợp đồng này có thể bị vô hiệu khi nào?"
        type: string
      timeout_seconds:
        description: "Per-request timeout in seconds. Use up to 600 seconds for production ML cold start."
        required: false
        default: 600
        type: number

permissions:
  contents: read

concurrency:
  group: azure-production-ask-smoke
  cancel-in-progress: false

jobs:
  production-ask-smoke:
    name: Run one production ask smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production

    env:
      AZURE_PRODUCTION_BACKEND_URL: ${{ secrets.AZURE_PRODUCTION_BACKEND_URL }}
      CONFIRM_REAL_PRODUCTION_ASK: ${{ inputs.confirm_real_production_ask }}
      EXPECTED_RETRIEVAL_MODE: hybrid
      SMOKE_QUESTION: ${{ inputs.question }}
      TIMEOUT_SECONDS: ${{ inputs.timeout_seconds }}

    steps:
      - name: Validate dispatch guard
        run: |
          set -euo pipefail

          if [ "${GITHUB_REF_NAME:-}" != "main" ]; then
            printf 'This smoke workflow must be dispatched from main.\n'
            exit 1
          fi

          if [ "$CONFIRM_REAL_PRODUCTION_ASK" != "I_UNDERSTAND_THIS_CALLS_REAL_PRODUCTION_SERVICES" ]; then
            printf 'Confirmation phrase did not match; no production ask request was sent.\n'
            exit 1
          fi

          if [ -z "${AZURE_PRODUCTION_BACKEND_URL:-}" ]; then
            printf 'Missing required GitHub Environment secret name: AZURE_PRODUCTION_BACKEND_URL\n'
            exit 1
          fi

          case "$TIMEOUT_SECONDS" in
            ''|*[!0-9]*)
              printf 'timeout_seconds must be a positive integer.\n'
              exit 1
              ;;
          esac

          if [ "$TIMEOUT_SECONDS" -lt 1 ] || [ "$TIMEOUT_SECONDS" -gt 600 ]; then
            printf 'timeout_seconds must be between 1 and 600.\n'
            exit 1
          fi

          printf 'Expected production retrieval mode: %s\n' "$EXPECTED_RETRIEVAL_MODE"

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check production health and readiness
        run: |
          set -euo pipefail

          base_url="${AZURE_PRODUCTION_BACKEND_URL%/}"

          health_file="$(mktemp)"
          health_status="$(
            curl -sS --max-time "$TIMEOUT_SECONDS" -o "$health_file" -w '%{http_code}' "$base_url/health"
          )"
          rm -f "$health_file"
          printf 'Health HTTP status: %s\n' "$health_status"
          if [ "$health_status" != "200" ]; then
            printf 'Health check failed; ask smoke was not sent.\n'
            exit 1
          fi

          readiness_file="$(mktemp)"
          readiness_status="$(
            curl -sS --max-time "$TIMEOUT_SECONDS" -o "$readiness_file" -w '%{http_code}' "$base_url/api/v1/readiness"
          )"
          printf 'Readiness HTTP status: %s\n' "$readiness_status"
          if [ "$readiness_status" != "200" ]; then
            rm -f "$readiness_file"
            printf 'Readiness check failed; ask smoke was not sent.\n'
            exit 1
          fi

          READINESS_FILE="$readiness_file" python - <<'PY'
          from __future__ import annotations

          import json
          import os
          import sys
          from pathlib import Path

          payload = json.loads(Path(os.environ["READINESS_FILE"]).read_text(encoding="utf-8"))
          print(f"Readiness ready: {payload.get('ready')}")
          print(f"Readiness service_mode: {payload.get('service_mode')}")
          if payload.get("ready") is not True:
              raise SystemExit("Readiness was not ready; ask smoke was not sent.")
          PY
          rm -f "$readiness_file"

      - name: Verify production embedding warmup
        run: |
          set -euo pipefail

          base_url="${AZURE_PRODUCTION_BACKEND_URL%/}"
          response_file="$(mktemp)"
          warmup_status="$(
            curl -sS --max-time 220 -o "$response_file" -w '%{http_code}' \
              "$base_url/api/v1/legal-qa/warmup"
          )"

          printf 'First warmup HTTP status: %s\n' "$warmup_status"
          if [ "$warmup_status" != "200" ]; then
            rm -f "$response_file"
            printf 'Warmup failed; ask smoke was not sent.\n'
            exit 1
          fi

          first_model_cache_key="$(
            RESPONSE_FILE="$response_file" WARMUP_STATUS="$warmup_status" python - <<'PY'
          from __future__ import annotations

          import json
          import os
          from pathlib import Path

          from scripts.deployment.validate_production_ask_smoke_response import (
              validate_warmup_payload,
          )

          response_path = Path(os.environ["RESPONSE_FILE"])
          raw_body = response_path.read_text(encoding="utf-8", errors="replace")
          try:
              payload = json.loads(raw_body)
          except json.JSONDecodeError:
              raise SystemExit("Warmup response was not JSON; ask smoke was not sent.")

          for line in validate_warmup_payload(payload, http_status=os.environ["WARMUP_STATUS"]):
              print(line, file=sys.stderr)
          print(payload["model_cache_key"])
          PY
          )"
          rm -f "$response_file"
          printf 'First warmup model_cache_key: %s\n' "$first_model_cache_key"

          second_response_file="$(mktemp)"
          second_warmup_status="$(
            curl -sS --max-time 220 -o "$second_response_file" -w '%{http_code}' \
              "$base_url/api/v1/legal-qa/warmup"
          )"
          printf 'Second warmup HTTP status: %s\n' "$second_warmup_status"
          RESPONSE_FILE="$second_response_file" \
          WARMUP_STATUS="$second_warmup_status" \
          EXPECTED_MODEL_CACHE_KEY="$first_model_cache_key" python - <<'PY'
          from __future__ import annotations

          import json
          import os
          from pathlib import Path

          from scripts.deployment.validate_production_ask_smoke_response import (
              validate_warmup_payload,
          )

          response_path = Path(os.environ["RESPONSE_FILE"])
          raw_body = response_path.read_text(encoding="utf-8", errors="replace")
          try:
              payload = json.loads(raw_body)
          except json.JSONDecodeError:
              raise SystemExit("Second warmup response was not JSON; ask smoke was not sent.")

          for line in validate_warmup_payload(
              payload,
              http_status=os.environ["WARMUP_STATUS"],
              require_cache_hit_before=True,
              expected_model_cache_key=os.environ["EXPECTED_MODEL_CACHE_KEY"],
          ):
              print(line)
          PY
          rm -f "$second_response_file"

          {
            printf 'WARMUP_MODEL_CACHE_KEY=%s\n' "$first_model_cache_key"
          } >> "$GITHUB_ENV"

      - name: Send exactly one production ask request
        run: |
          set -euo pipefail

          base_url="${AZURE_PRODUCTION_BACKEND_URL%/}"
          payload_file="$(mktemp)"
          response_file="$(mktemp)"

          SMOKE_PAYLOAD_FILE="$payload_file" python - <<'PY'
          from __future__ import annotations

          import json
          import os
          from pathlib import Path

          payload = {
              "question": os.environ["SMOKE_QUESTION"],
              "conversation_context": [
                  {
                      "role": "user",
                      "content": (
                          "Theo Bộ luật Dân sự Việt Nam, hợp đồng dân sự có thể "
                          "bị vô hiệu trong những trường hợp nào?"
                      ),
                  }
              ],
              "top_k": 5,
              "include_evidence": False,
              "include_debug": False,
          }
          Path(os.environ["SMOKE_PAYLOAD_FILE"]).write_text(
              json.dumps(payload, ensure_ascii=False),
              encoding="utf-8",
          )
          PY

          started_at="$(date +%s)"
          ask_status="$(
            curl -sS --max-time "$TIMEOUT_SECONDS" \
              -H 'Content-Type: application/json' \
              -o "$response_file" \
              -w '%{http_code}' \
              --data-binary "@$payload_file" \
              "$base_url/api/v1/legal-qa/ask"
          )"
          finished_at="$(date +%s)"
          duration_seconds="$((finished_at - started_at))"
          rm -f "$payload_file"

          printf 'Ask HTTP status: %s\n' "$ask_status"
          printf 'Ask request duration seconds: %s\n' "$duration_seconds"
          python scripts/deployment/validate_production_ask_smoke_response.py \
            --http-status "$ask_status" \
            --response-file "$response_file" \
            --expected-model-cache-key "$WARMUP_MODEL_CACHE_KEY"
          rm -f "$response_file"
