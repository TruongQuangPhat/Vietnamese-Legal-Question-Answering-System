# ===========================================================================
# VnLaw-QA — Docker Compose cho môi trường Development
# Khởi chạy: docker compose -f deploy/docker-compose.yml up -d
# ===========================================================================

services:
  # --- Qdrant Vector Database ---
  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: vnlaw-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped

  # --- Redis Cache ---
  redis:
    image: redis:7-alpine
    container_name: vnlaw-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  qdrant_data:
  redis_data:
