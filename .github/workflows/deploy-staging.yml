name: Deploy Staging

on:
  workflow_dispatch:
    inputs:
      service_mode:
        description: "Backend service mode for staging deployment"
        required: true
        default: "fake"
        type: choice
        options:
          - fake
          - real-readiness
      run_readiness:
        description: "Run /api/v1/readiness after /health. Use only after config review."
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: azure-staging
  cancel-in-progress: false

jobs:
  deploy-staging:
    name: Deploy Azure App Service staging
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: staging

    env:
      SERVICE_MODE: ${{ inputs.service_mode }}
      RUN_READINESS: ${{ inputs.run_readiness }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
      AZURE_WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}
      AZURE_STAGING_BACKEND_URL: ${{ secrets.AZURE_STAGING_BACKEND_URL }}
      STAGING_QDRANT_URL: ${{ secrets.QDRANT_URL }}
      STAGING_QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
      STAGING_OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      STAGING_LEGAL_QA_DATABASE_URL: ${{ secrets.LEGAL_QA_DATABASE_URL }}
      STAGING_LEGAL_QA_SESSION_SECRET: ${{ secrets.LEGAL_QA_SESSION_SECRET }}
      STAGING_LEGAL_QA_CHUNKS_URL: ${{ secrets.LEGAL_QA_CHUNKS_URL }}
      STAGING_LEGAL_QA_CHUNKS_SHA256: ${{ secrets.LEGAL_QA_CHUNKS_SHA256 }}
      STAGING_LEGAL_QA_QDRANT_URL: ${{ secrets.LEGAL_QA_QDRANT_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Validate workflow dispatch inputs
        run: |
          set -euo pipefail

          case "$SERVICE_MODE" in
            fake|real-readiness)
              printf 'Selected staging service mode: %s\n' "$SERVICE_MODE"
              ;;
            *)
              printf 'Invalid service_mode. Expected fake or real-readiness.\n'
              exit 1
              ;;
          esac

          case "$RUN_READINESS" in
            true|false)
              printf 'Readiness smoke requested: %s\n' "$RUN_READINESS"
              ;;
            *)
              printf 'Invalid run_readiness value. Expected true or false.\n'
              exit 1
              ;;
          esac

      - name: Validate required staging secrets
        run: |
          set -euo pipefail

          required_env_names=(
            AZURE_CLIENT_ID
            AZURE_TENANT_ID
            AZURE_SUBSCRIPTION_ID
            AZURE_RESOURCE_GROUP
            AZURE_WEBAPP_NAME
            AZURE_STAGING_BACKEND_URL
          )

          if [ "$SERVICE_MODE" = "real-readiness" ]; then
            required_env_names+=(
              STAGING_QDRANT_URL
              STAGING_QDRANT_API_KEY
              STAGING_OPENROUTER_API_KEY
              STAGING_LEGAL_QA_DATABASE_URL
              STAGING_LEGAL_QA_SESSION_SECRET
              STAGING_LEGAL_QA_CHUNKS_URL
              STAGING_LEGAL_QA_CHUNKS_SHA256
            )
          fi

          missing_names=()
          for env_name in "${required_env_names[@]}"; do
            public_name="$env_name"
            case "$env_name" in
              STAGING_QDRANT_URL)
                public_name="QDRANT_URL"
                ;;
              STAGING_QDRANT_API_KEY)
                public_name="QDRANT_API_KEY"
                ;;
              STAGING_OPENROUTER_API_KEY)
                public_name="OPENROUTER_API_KEY"
                ;;
              STAGING_LEGAL_QA_DATABASE_URL)
                public_name="LEGAL_QA_DATABASE_URL"
                ;;
              STAGING_LEGAL_QA_SESSION_SECRET)
                public_name="LEGAL_QA_SESSION_SECRET"
                ;;
              STAGING_LEGAL_QA_CHUNKS_URL)
                public_name="LEGAL_QA_CHUNKS_URL"
                ;;
              STAGING_LEGAL_QA_CHUNKS_SHA256)
                public_name="LEGAL_QA_CHUNKS_SHA256"
                ;;
            esac
            if [ -z "${!env_name:-}" ]; then
              missing_names+=("$public_name")
            fi
          done

          if [ "${#missing_names[@]}" -gt 0 ]; then
            printf 'Missing required GitHub Environment secret names:\n'
            printf '%s\n' "${missing_names[@]}"
            exit 1
          fi

          printf 'Required GitHub Environment secret names are present.\n'

      - name: Lightweight dependency and package sanity check
        run: |
          set -euo pipefail

          uv lock --check
          uv sync --frozen --no-dev --extra qdrant
          uv run python -m py_compile src/api/app.py

      - name: Create App Service deployment package
        run: |
          set -euo pipefail

          package_root="$RUNNER_TEMP/vnlaw-app-service-package"
          package_zip="$RUNNER_TEMP/vnlaw-app-service-package.zip"
          rm -rf "$package_root" "$package_zip"
          mkdir -p "$package_root"

          rsync -a ./ "$package_root"/ \
            --exclude '.git' \
            --exclude '.venv' \
            --exclude '.mypy_cache' \
            --exclude '.pytest_cache' \
            --exclude '.ruff_cache' \
            --exclude 'apps/frontend/node_modules' \
            --exclude 'apps/frontend/.next' \
            --exclude 'data/raw' \
            --exclude 'data/interim' \
            --exclude 'data/processed/legal_chunks.jsonl' \
            --exclude 'data/reports' \
            --exclude 'data/eval' \
            --exclude 'artifacts/reports/evaluation'

          uv export --frozen --no-dev --extra qdrant --no-hashes --output-file "$package_root/requirements.txt"

          (
            cd "$package_root"
            zip -qr "$package_zip" .
          )

          printf 'DEPLOY_PACKAGE=%s\n' "$package_zip" >> "$GITHUB_ENV"
          printf 'Created App Service deployment package.\n'

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Configure App Service settings
        run: |
          set -euo pipefail

          app_settings=(
            PORT=8000
            LEGAL_QA_SERVICE_MODE=fake
            LEGAL_QA_ALLOW_REAL_TESTS=0
            LEGAL_QA_ALLOW_DB_TESTS=0
            LEGAL_QA_RATE_LIMIT_ENABLED=false
            LEGAL_QA_AUTH_ENABLED=false
            SCM_DO_BUILD_DURING_DEPLOYMENT=true
          )

          if [ "$SERVICE_MODE" = "real-readiness" ]; then
            qdrant_api_key_name="QDRANT_API_KEY"
            legal_qa_qdrant_api_key_name="LEGAL_QA_QDRANT_API_KEY"
            openrouter_api_key_name="OPENROUTER_API_KEY"
            database_url_name="LEGAL_QA_DATABASE_URL"
            session_secret_name="LEGAL_QA_SESSION_SECRET"

            app_settings=(
              PORT=8000
              LEGAL_QA_SERVICE_MODE=real
              LEGAL_QA_ALLOW_REAL_TESTS=0
              LEGAL_QA_ALLOW_DB_TESTS=0
              LEGAL_QA_RATE_LIMIT_ENABLED=false
              LEGAL_QA_AUTH_ENABLED=false
              SCM_DO_BUILD_DURING_DEPLOYMENT=true
              LEGAL_QA_COLLECTION_NAME=vnlaw_chunks_bgem3_v1_full
              QDRANT_COLLECTION=vnlaw_chunks_bgem3_v1_full
              LEGAL_QA_CHUNKS_PATH=/home/data/legal_chunks.jsonl
              LEGAL_QA_CHUNKS_URL="$STAGING_LEGAL_QA_CHUNKS_URL"
              LEGAL_QA_CHUNKS_SHA256="$STAGING_LEGAL_QA_CHUNKS_SHA256"
              LEGAL_QA_QDRANT_URL="${STAGING_LEGAL_QA_QDRANT_URL:-$STAGING_QDRANT_URL}"
              QDRANT_URL="$STAGING_QDRANT_URL"
              "${qdrant_api_key_name}=$STAGING_QDRANT_API_KEY"
              "${legal_qa_qdrant_api_key_name}=$STAGING_QDRANT_API_KEY"
              "${openrouter_api_key_name}=$STAGING_OPENROUTER_API_KEY"
              "${database_url_name}=$STAGING_LEGAL_QA_DATABASE_URL"
              "${session_secret_name}=$STAGING_LEGAL_QA_SESSION_SECRET"
            )
          fi

          az webapp config appsettings set \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_WEBAPP_NAME" \
            --settings "${app_settings[@]}" \
            --output none

          printf 'Configured App Service setting names for selected service mode.\n'

      - name: Configure App Service startup command
        run: |
          set -euo pipefail

          az webapp config set \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_WEBAPP_NAME" \
            --startup-file "python -m uvicorn src.api.app:app --host 0.0.0.0 --port 8000" \
            --output none

          printf 'Configured App Service startup command.\n'

      - name: Deploy package to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          package: ${{ env.DEPLOY_PACKAGE }}

      - name: Restart Azure Web App
        run: |
          set -euo pipefail

          az webapp restart \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_WEBAPP_NAME" \
            --output none

          printf 'Restarted Azure Web App after package deployment.\n'

      - name: Smoke staging health
        run: |
          set -euo pipefail

          staging_url="${AZURE_STAGING_BACKEND_URL%/}"
          if [ -z "$staging_url" ]; then
            printf 'Staging backend URL is missing.\n'
            exit 1
          fi

          health_passed=false
          for attempt in {1..30}; do
            response_file="$(mktemp)"
            http_status="$(
              curl -sS -o "$response_file" -w '%{http_code}' "$staging_url/health" || true
            )"
            if [ "$http_status" = "200" ]; then
              response="$(cat "$response_file")"
              rm -f "$response_file"
              printf 'Health HTTP status: %s\n' "$http_status"
              case "$response" in
                *'"status":"ok"'*|*'"status": "ok"'*)
                  health_passed=true
                  break
                  ;;
              esac
              printf 'Unexpected health response payload.\n'
              exit 1
            fi
            rm -f "$response_file"
            printf 'Health smoke attempt %s failed; retrying.\n' "$attempt"
            sleep 5
          done

          if [ "$health_passed" != "true" ]; then
            printf 'Staging health smoke did not pass in time.\n'
            exit 1
          fi

          printf 'STAGING_HEALTH_PASSED=true\n' >> "$GITHUB_ENV"

      - name: Smoke staging readiness
        if: ${{ inputs.run_readiness || inputs.service_mode == 'real-readiness' }}
        run: |
          set -euo pipefail

          staging_url="${AZURE_STAGING_BACKEND_URL%/}"
          readiness_passed=false
          for attempt in {1..20}; do
            response_file="$(mktemp)"
            http_status="$(
              curl -sS -o "$response_file" -w '%{http_code}' "$staging_url/api/v1/readiness" || true
            )"
            response="$(cat "$response_file")"
            rm -f "$response_file"

            printf 'Readiness HTTP status: %s\n' "$http_status"
            if [ "$http_status" = "200" ]; then
              READINESS_RESPONSE="$response" python - <<'PY'
          from __future__ import annotations

          import json
          import os

          payload = json.loads(os.environ["READINESS_RESPONSE"])
          checks = payload.get("checks", [])
          print(f"Readiness ready: {payload.get('ready')}")
          print(f"Readiness service_mode: {payload.get('service_mode')}")
          for check in checks:
              print(
                  "Readiness check: "
                  f"{check.get('name')} ready={check.get('ready')} detail={check.get('detail')}"
              )
          PY
              readiness_passed=true
              break
            fi

            printf 'Readiness smoke attempt %s failed; retrying.\n' "$attempt"
            sleep 5
          done

          if [ "$readiness_passed" != "true" ]; then
            printf 'Staging readiness smoke did not pass in time.\n'
            exit 1
          fi

          printf 'STAGING_READINESS_RAN=true\n' >> "$GITHUB_ENV"

      - name: Print safe deployment summary
        run: |
          set -euo pipefail

          printf 'Staging service mode: %s\n' "$SERVICE_MODE"
          printf 'Health smoke passed: %s\n' "${STAGING_HEALTH_PASSED:-false}"
          printf 'Readiness smoke ran: %s\n' "${STAGING_READINESS_RAN:-false}"
          printf 'Deployment target: Azure App Service Web App\n'
