name: Backend CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  LEGAL_QA_SERVICE_MODE: fake
  LEGAL_QA_ALLOW_REAL_TESTS: "0"
  LEGAL_QA_ALLOW_DB_TESTS: "0"
  LEGAL_QA_RATE_LIMIT_ENABLED: "false"
  OPENROUTER_API_KEY: ""
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  QDRANT_API_KEY: ""
  LEGAL_QA_QDRANT_API_KEY: ""
  LEGAL_QA_DATABASE_URL: ""
  LEGAL_QA_SESSION_SECRET: ""
  HF_TOKEN: ""

jobs:
  backend:
    name: Backend quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync Python dependencies
        run: uv sync --frozen

      - name: Check uv lockfile
        run: uv lock --check

      - name: Ruff lint
        run: uv run ruff check src scripts tests

      - name: Ruff format check
        run: uv run ruff format --check src scripts tests

      - name: Python compile check
        run: env UV_CACHE_DIR=/tmp/vnlaw-uv-cache find src scripts tests -name '*.py' -exec uv run python -m py_compile {} +

      - name: Unit tests
        run: uv run pytest tests/unit -q --durations=30

      - name: Whitespace diff check
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          zero_sha="0000000000000000000000000000000000000000"

          if [ "$EVENT_NAME" = "pull_request" ]; then
            git diff --check "$PR_BASE_SHA...$PR_HEAD_SHA"
          elif [ -n "$PUSH_BEFORE_SHA" ] && [ "$PUSH_BEFORE_SHA" != "$zero_sha" ]; then
            git diff --check "$PUSH_BEFORE_SHA...$CURRENT_SHA"
          else
            git diff --check HEAD~1...HEAD
          fi
