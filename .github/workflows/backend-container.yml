  name: Backend Container

  on:
    pull_request:
    push:
      branches:
        - main

  permissions:
    contents: read

  env:
    LEGAL_QA_SERVICE_MODE: fake
    LEGAL_QA_ALLOW_REAL_TESTS: "0"
    LEGAL_QA_ALLOW_DB_TESTS: "0"
    LEGAL_QA_RATE_LIMIT_ENABLED: "false"
    OPENROUTER_API_KEY: ""
    OPENAI_API_KEY: ""
    ANTHROPIC_API_KEY: ""
    QDRANT_API_KEY: ""
    LEGAL_QA_QDRANT_API_KEY: ""
    LEGAL_QA_DATABASE_URL: ""
    LEGAL_QA_SESSION_SECRET: ""
    HF_TOKEN: ""

  jobs:
    backend-container:
      name: Backend fake-mode container smoke
      runs-on: ubuntu-latest
      timeout-minutes: 15

      steps:
        - name: Check out repository
          uses: actions/checkout@v4

        - name: Build backend image
          run: docker build -f docker/backend/Dockerfile -t vnlaw-qa-backend:test .

        - name: Run backend container
          run: |
            set -euo pipefail

            docker run \
              --detach \
              --name vnlaw-qa-backend-smoke \
              --publish 127.0.0.1:8080:8000 \
              --env PORT=8000 \
              --env LEGAL_QA_SERVICE_MODE=fake \
              --env LEGAL_QA_ALLOW_REAL_TESTS=0 \
              --env LEGAL_QA_ALLOW_DB_TESTS=0 \
              --env LEGAL_QA_RATE_LIMIT_ENABLED=false \
              --env OPENROUTER_API_KEY="" \
              --env OPENAI_API_KEY="" \
              --env ANTHROPIC_API_KEY="" \
              --env QDRANT_API_KEY="" \
              --env LEGAL_QA_QDRANT_API_KEY="" \
              --env LEGAL_QA_DATABASE_URL="" \
              --env LEGAL_QA_SESSION_SECRET="" \
              --env HF_TOKEN="" \
              vnlaw-qa-backend:test

        - name: Smoke health endpoint
          run: |
            set -euo pipefail

            for _ in {1..30}; do
              if response="$(curl -fsS http://127.0.0.1:8080/health)"; then
                printf 'Health response: %s\n' "$response"
                case "$response" in
                  *'"status":"ok"'*|*'"status": "ok"'*)
                    exit 0
                    ;;
                esac
                printf 'Unexpected health response payload.\n'
                docker logs vnlaw-qa-backend-smoke
                exit 1
              fi
              sleep 2
            done

            printf 'Backend container did not become healthy in time.\n'
            docker logs vnlaw-qa-backend-smoke
            exit 1

        - name: Stop backend container
          if: always()
          run: docker rm -f vnlaw-qa-backend-smoke >/dev/null 2>&1 || true
