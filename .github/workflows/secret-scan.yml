name: Secret Scan

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  secret-scan:
    name: Lightweight secret guard
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for high-signal secret patterns
        run: |
          python - <<'PY'
          from __future__ import annotations

          import re
          import subprocess
          import sys
          from pathlib import Path

          blocked_files = {
              ".env": "secret-file",
              "apps/frontend/.env.local": "secret-file",
          }

          excluded_prefixes = (
              ".git/",
              ".mypy_cache/",
              ".pytest_cache/",
              ".ruff_cache/",
              ".venv/",
              "apps/frontend/.next/",
              "apps/frontend/node_modules/",
              "node_modules/",
          )

          placeholder_values = {
              "",
              '""',
              "''",
              "<secret>",
              "<Render secret>",
              "<Qdrant Cloud endpoint>",
              "<same Qdrant Cloud endpoint>",
              "<secret managed PostgreSQL URL>",
              "<secret Neon/PostgreSQL URL>",
              "<strong random secret>",
              "<placeholder>",
              "placeholder",
              "your-secret-here",
              "changeme",
          }

          url_separator = re.escape("://")

          assignment_patterns = [
              (
                  "database-url",
                  re.compile(
                      rf"(?i)\b((?:postgres(?:ql)?|mysql|mariadb|mongodb(?:\+srv)?){url_separator}[^\s\"'<>]+)"
                  ),
              ),
              (
                  "legal-qa-database-url",
                  re.compile(r"\bLEGAL_QA_DATABASE_URL[ \t]*[:=][ \t]*([^\s#]+)"),
              ),
              (
                  "legal-qa-session-secret",
                  re.compile(r"\bLEGAL_QA_SESSION_SECRET[ \t]*[:=][ \t]*([^\s#]+)"),
              ),
              (
                  "openrouter-api-key",
                  re.compile(r"\bOPENROUTER_API_KEY[ \t]*[:=][ \t]*([^\s#]+)"),
              ),
              (
                  "openai-api-key",
                  re.compile(r"\bOPENAI_API_KEY[ \t]*[:=][ \t]*([^\s#]+)"),
              ),
              (
                  "anthropic-api-key",
                  re.compile(r"\bANTHROPIC_API_KEY[ \t]*[:=][ \t]*([^\s#]+)"),
              ),
              (
                  "hf-token",
                  re.compile(r"\bHF_TOKEN[ \t]*[:=][ \t]*([^\s#]+)"),
              ),
              (
                  "qdrant-api-key",
                  re.compile(r"\b(?:QDRANT_API_KEY|LEGAL_QA_QDRANT_API_KEY)[ \t]*[:=][ \t]*([^\s#]+)"),
              ),
          ]

          raw_patterns = [
              ("authorization-bearer", re.compile(r"(?i)\bAuthorization\s*:\s*Bearer\s+[A-Za-z0-9._~+/=-]{16,}")),
              ("openai-key", re.compile(r"\bsk-[A-Za-z0-9_-]{20,}\b")),
              ("anthropic-key", re.compile(r"\bsk-ant-[A-Za-z0-9_-]{20,}\b")),
              ("huggingface-token", re.compile(r"\bhf_[A-Za-z0-9]{20,}\b")),
          ]

          def tracked_files() -> list[str]:
              result = subprocess.run(
                  ["git", "ls-files"],
                  check=True,
                  text=True,
                  stdout=subprocess.PIPE,
              )
              return [
                  path
                  for path in result.stdout.splitlines()
                  if path and not path.startswith(excluded_prefixes)
              ]

          def is_placeholder(value: str) -> bool:
              normalized = value.strip().strip(",").strip().strip("\"'")
              return normalized in placeholder_values or normalized.startswith("<")

          def is_allowed_test_value(path: str, value: str) -> bool:
              if not path.startswith("tests/"):
                  return False
              normalized = value.strip().strip(",").strip().strip("\"'")
              return any(
                  marker in normalized.lower()
                  for marker in ("test", "secret", "password", "unused", "must-not-appear")
              )

          def is_allowed_database_placeholder(path: str, value: str) -> bool:
              normalized = value.strip().strip(",").strip().strip("\"'")
              test_postgres_placeholder = "postgresql" + "://" + "unused"
              if path == ".env.example" and (
                  "user:password@" in normalized or "your-" in normalized
              ):
                  return True
              if path.startswith("tests/") and (
                  "user:password@" in normalized
                  or "user:secret@" in normalized
                  or normalized.startswith(test_postgres_placeholder)
              ):
                  return True
              return False

          findings: list[tuple[str, str]] = []

          for path in tracked_files():
              if path in blocked_files:
                  findings.append((path, blocked_files[path]))
                  continue

              file_path = Path(path)
              try:
                  text = file_path.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                  continue

              for rule_name, pattern in assignment_patterns:
                  for match in pattern.finditer(text):
                      if match.groups():
                          value = match.group(1)
                          if (
                              is_placeholder(value)
                              or is_allowed_test_value(path, value)
                              or (
                                  rule_name in {"database-url", "legal-qa-database-url"}
                                  and is_allowed_database_placeholder(path, value)
                              )
                          ):
                              continue
                      findings.append((path, rule_name))
                      break

              for rule_name, pattern in raw_patterns:
                  if pattern.search(text):
                      findings.append((path, rule_name))

          if findings:
              print("Potential secret material detected. Values are intentionally not printed.")
              for path, rule_name in sorted(set(findings)):
                  print(f"{path}: {rule_name}")
              sys.exit(1)

          print("No high-signal secret patterns detected.")
          PY
